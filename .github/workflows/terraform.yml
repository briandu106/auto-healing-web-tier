name: "Terraform GitOps Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read  # Allows the runner to checkout your repository code safely

jobs:
  terraform:
    name: "Terraform Core Engine"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "ap-southeast-4"

    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup standard Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.15.0"

      # 3. Code formatting compliance check
      - name: Terraform Format Check
        run: terraform fmt -check

      # 4. Authenticate via Traditional Static Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. Initialize modules and remote S3 backend
      - name: Terraform Init
        run: terraform init

      # 6. Validate configuration syntax
      - name: Terraform Validate
        run: terraform validate

      # 7. Generate execution plan (Runs on both direct pushes to main and PRs)
      - name: Terraform Plan
        run: terraform plan -no-color
